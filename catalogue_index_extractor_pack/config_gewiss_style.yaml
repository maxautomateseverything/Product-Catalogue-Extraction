input_pdf: 'C:\Users\max.yoong\OneDrive - Edmundson Electrical Ltd\Product Data - Documents\1 - Pentaho\X - Max Yoong\7. Catalogue\Catalogue_PDFs\Gewiss\gewiss-trade-catalogue-2025---2026-en.pdf'
output_folder: 'C:\Users\max.yoong\OneDrive - Edmundson Electrical Ltd\Product Data - Documents\1 - Pentaho\X - Max Yoong\7. Catalogue\Catalogue_PDFs\Gewiss\Index_Output'
# Inclusive
index_pdf_pages: "1293-1364"
page_source_of_truth: "pdf_page_number"

# inclusion_mode used to decide whether to flag data spill issues. "left" means that the left edge of the data must be within the left edge of the header, and "right" means that the right edge of the data must be within the right edge of the header. "both" means that both edges must be within the header edges.
# use left when left aligned, right when right aligned, and both when centered.
required_columns:
  sku:
    header_text: "Code"
    alignment: "left"
    inclusion_mode: "left"
  page:
    header_text: "Page"
    alignment: "right"
    inclusion_mode: "right"

optional_columns:
  - output_name: "pack_carton"
    header_text: "Pack/carton"
    alignment: "right"
    inclusion_mode: "right"
    value_regex: "^[0-9]+(?:/[0-9]+)*$"
    invalid_value_action: "blank_and_warn"
  - output_name: "pallet"
    header_text: "Pallet"
    alignment: "right"
    inclusion_mode: "right"
    value_regex: "^[0-9]+$"
    invalid_value_action: "blank_and_warn"


expected_table_blocks_per_page: 3

header_matching:
  case_sensitive: false

sku_detection:
  positive_examples:
    - "GW 21 005"
    - "GW D3 674"
    - "DX 56 225"
    - "DX 15 825 R"
    - "GW 10 051 AB"
    - "GW 10 159 F"
    - "GW 16 022 SPW"
  negative_examples:
    - "GW 21"
    - "DX 26"
  sku_regex: "\\b(?:GW|DX)(?:[\\s\\-_/\\.]+[A-Z0-9]{1,8}){2,5}\\b"

sku_rules:
  uppercase_only: true
  allowed_characters: "A-Z0-9 space hyphen slash dot underscore plus"

page_detection:
  positive_examples:
    - "985"
  # Leave blank to keep any non-empty text found in the Page column.
  page_regex: "(?i)\\b(?:see\\s+page\\s+)?[A-Z]?\\d+(?:\\s*(?:,|/|;|-)\\s*[A-Z]?\\d+)*\\b"
  keep_original_and_normalized: true

ignore_row_patterns:
  - "^DX\\s+\\d+$"
  - "^GW\\s+\\d+$"

example_validation_pairs:
  - sku: "GW 21 005"
    page: "1026"

example_validation_groups:
  - code: "DX 10 016 R"
    pack_carton: "100/6400"
    pallet: "6400"
    page: "344"
  - code: "GW 15 415"
    pack_carton: "1/12"
    page: "839"

extraction_mode: "auto"

debug_images:
  enabled: true
  only_issue_pages: true
  label_zones: true

review_files:
  excel_safe: true
  write_separate_csvs: false

advanced:
  header_y_tolerance: 6.0
  line_y_tolerance: 3.0
  data_start_padding: 1.0
  x_tolerance: 1
  y_tolerance: 3
  data_bottom: 802.445
  boundary_overlap_warning_threshold: 0.75

