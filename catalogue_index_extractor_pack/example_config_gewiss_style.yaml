input_pdf: "C:/Path/To/gewiss-trade-catalogue-2025---2026-en.pdf"
output_folder: "C:/Path/To/Index Output"
index_pdf_pages: "1293-1364"
page_source_of_truth: "pdf_page_number"

required_columns:
  sku:
    header_text: "Code"
    alignment: "left"
    inclusion_mode: "left"
  page:
    header_text: "Page"
    alignment: "left"
    inclusion_mode: "left"

optional_columns:
  - output_name: "pack_carton"
    header_text: "Pack/carton"
    alignment: "left"
    inclusion_mode: "left"
    value_regex: "^[0-9]+(?:/[0-9]+)*$"
    invalid_value_action: "blank_and_warn"
  - output_name: "pallet"
    header_text: "Pallet"
    alignment: "left"
    inclusion_mode: "left"
    value_regex: "^[0-9]+$"
    invalid_value_action: "blank_and_warn"

expected_table_blocks_per_page: 3

header_matching:
  case_sensitive: false

sku_detection:
  positive_examples:
    - "GW 21 005"
    - "GW D3 674"
    - "DX 56 225"
    - "DX 15 825 R"
    - "GW 10 051 AB"
    - "GW 10 159 F"
  negative_examples:
    - "DX 26"
    - "GW 21"
  sku_regex: "\\b(?:GW|DX)(?:[\\s\\-_/\\.]+[A-Z0-9]{1,8}){2,5}\\b"

sku_rules:
  uppercase_only: true
  allowed_characters: "A-Z0-9 space hyphen slash dot underscore plus"

page_detection:
  positive_examples:
    - "344"
    - "839"
    - "12/13"
  page_regex: "(?i)\\b(?:see\\s+page\\s+)?[A-Z]?\\d+(?:\\s*(?:,|/|;|-)\\s*[A-Z]?\\d+)*\\b"
  keep_original_and_normalized: true

ignore_row_patterns:
  - "^DX\\s+\\d+$"
  - "^GW\\s+\\d+$"

example_validation_groups:
  - code: "DX 10 016 R"
    pack_carton: "100/6400"
    pallet: "6400"
    page: "344"
  - code: "GW 15 415"
    pack_carton: "1/12"
    page: "839"

extraction_mode: "auto"

debug_images:
  enabled: true
  only_issue_pages: true
  label_zones: true

review_files:
  excel_safe: true
  write_separate_csvs: false

advanced:
  header_y_tolerance: 6.0
  line_y_tolerance: 3.0
  data_start_padding: 1.0
  x_tolerance: 1
  y_tolerance: 3
  data_bottom: 760
  boundary_overlap_warning_threshold: 0.75
