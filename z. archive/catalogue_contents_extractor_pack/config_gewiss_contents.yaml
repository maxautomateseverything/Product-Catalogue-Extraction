classification_rules:
  # Rule examples only. Replace font sizes/fonts after running the inspector.
  - name: ignore_index_title
    priority: 1
    action: ignore
    text_regex: "^Index\\b"

  - name: main_header_energy_installation
    priority: 10
    action: set_main_header
    text_regex: "^(ENERGY|INSTALLATION|MOBILITY|BUILDING)$"

  - name: uppercase_category_header
    priority: 20
    action: set_subheader_1
    text_regex: "^[A-Z][A-Z0-9 &/\\-]+$"
    font_size_min: 8

  - name: lowest_level_item
    priority: 100
    action: emit_row
    page_number_position: trailing
    # Regex captures code/title/page from rows like:
    # RK Rigid protective conduit systems 330
    item_regex: "^(?P<code>[A-Z0-9][A-Z0-9 ]{0,12}?)\\s+(?P<title>.+?)\\s+(?P<page>\\d+)$"
    map:
      subheader_2: "{code}"
      subheader_3: "{title}"
      page_number: "{page}"

multiline_items:
  enabled: true
  same_style_required: true
  max_vertical_gap: 8
  mark_merged_rows_for_review: false

default_item_rule: true
default_item_text_field: subheader_3

validation_examples:
  - main_header: "INSTALLATION"
    subheader_1: "CONDUITS AND ACCESSORIES FOR INSTALLATION"
    subheader_2: "RK"
    subheader_3: "Rigid protective conduit systems"
    page_number: "330 - 344"

review_files:
  write_separate_csvs: false

debug_images:
  enabled: true
  only_issue_pages: true
  zoom: 1.5
